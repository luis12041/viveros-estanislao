<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login
    </title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <!-- STRIPE -->

    <script src="https://js.stripe.com/v3/"></script>

</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h1>
                🌿 Viveros Estanislao
            </h1>

            <h2>
                Iniciar Sesión
            </h2>

            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
            >

            <button
                id="btnUbicacion"
                class="btn-ubicacion"
            >

                📍 Usar mi ubicación actual

            </button>

            <input
                type="email"
                id="correo"
                placeholder="Correo electrónico"
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
            >

            <button id="btnLogin">

                Entrar

            </button>

            <button
                id="btnRegistro"
                class="btn-secundario"
            >

                Crear cuenta

            </button>

            <button
                id="btnRecuperar"
                class="btn-recuperar"
            >

                Olvidé mi contraseña

            </button>

        </div>

    </div>

    <script
        type="module"
        src="js/login.js"
    ></script>

    <script
        type="module"
        src="js/stripe.js"
    ></script>

</body>

</html>
