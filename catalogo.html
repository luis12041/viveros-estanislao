<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Viveros Estanislao
    </title>

    <link 
        rel="stylesheet" 
        href="css/style.css"
    >

    <script src="https://js.stripe.com/v3/"></script>

</head>

<body>

    <!-- HEADER -->

    <header class="header-premium">

        <div class="logo-header">

            <h1>
                🌿 Viveros Estanislao
            </h1>

        </div>

        <div class="acciones-header">

            <button 
                id="abrirHistorial"
                class="btn-historial"
            >

                📦

            </button>

            <button 
                id="abrirCarrito"
                class="btn-carrito-premium"
            >

                🛒 

                <span id="contador">

                    0

                </span>

            </button>

            <button 
                id="cerrarSesion" 
                class="btn-cerrar"
            >

                🚪 Cerrar sesión

            </button>

        </div>

    </header>

    <!-- HERO -->

    <section class="hero-premium">

        <div class="hero-contenido">

            <h2>
                Catálogo de Plantas
            </h2>

            <p>
                Encuentra plantas para interior y exterior 🌿
            </p>

        </div>

    </section>

    <!-- PERFIL -->

    <section class="perfil-usuario">

        <div>

            <h3 id="saludoUsuario">

                👋 Hola usuario

            </h3>

            <p>

                Bienvenido a Viveros Estanislao 🌿

            </p>

        </div>

        <div class="texto-naturaleza">

            🌱 Vive rodeado de naturaleza

        </div>

    </section>

    <!-- FILTROS -->

    <section class="filtros">

        <input
            type="text"
            id="buscador"
            placeholder="🔍 Buscar planta..."
        >

        <select id="filtroRiego">

            <option value="">
                Tipo de riego
            </option>

            <option>
                Poco riego
            </option>

            <option>
                Riego moderado
            </option>

            <option>
                Riego frecuente
            </option>

        </select>

    </section>

    <!-- SOL -->

    <section class="seccion-catalogo">

        <h2 class="titulo-seccion-catalogo">

            ☀️ Plantas de Sol

        </h2>

        <div 
            class="catalogo"
            id="catalogoSol"
        >

        </div>

    </section>

    <!-- SOMBRA -->

    <section class="seccion-catalogo">

        <h2 class="titulo-seccion-catalogo">

            🌑 Plantas de Sombra

        </h2>

        <div 
            class="catalogo"
            id="catalogoSombra"
        >

        </div>

    </section>

    <!-- RESOLANA -->

    <section class="seccion-catalogo">

        <h2 class="titulo-seccion-catalogo">

            🌤️ Resolana

        </h2>

        <div 
            class="catalogo"
            id="catalogoResolana"
        >

        </div>

    </section>

    <!-- HISTORIAL MODAL -->

    <div 
        class="modal-historial"
        id="modalHistorial"
    >

        <div class="contenido-historial">

            <div class="historial-header">

                <h2>
                    📦 Historial
                </h2>

                <span id="cerrarHistorial">

                    ✖

                </span>

            </div>

            <div 
                class="historial-grid"
                id="historialPedidos"
            >

            </div>

        </div>

    </div>

    <!-- CARRITO -->

    <aside id="carrito" class="carrito">

        <div class="carrito-header">

            <h2>
                🛒 Carrito
            </h2>

            <span id="cerrarCarrito">

                ✖

            </span>

        </div>

        <div id="carritoItems">

        </div>

        <!-- DIRECCION -->

        <div class="direccion-carrito">

            <h3>
                📍 Dirección entrega
            </h3>

            <input
                type="text"
                id="direccionEntrega"
                placeholder="Ejemplo: Calle Hidalgo #25"
            >

        </div>

        <h3 id="total">

            Total: $0

        </h3>

        <button id="finalizarCompra">

            Finalizar compra

        </button>

    </aside>

    <!-- SCRIPTS -->

    <script 
        type="module"
        src="js/auth.js"
    ></script>

    <script 
        type="module"
        src="js/app.js"
    ></script>

    <script 
        type="module"
        src="js/stripe.js"
    ></script>

</body>
</html>
