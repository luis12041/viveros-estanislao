<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Viveros Estanislao
    </title>

    <link 
        rel="stylesheet" 
        href="css/style.css"
    >

    <!-- STRIPE -->

    <script src="https://js.stripe.com/v3/"></script>

</head>

<body>

    <!-- HEADER PREMIUM -->

    <header class="header-premium">

        <div class="logo-header">

            <h1>
                🌿 Viveros Estanislao
            </h1>

        </div>

        <div class="acciones-header">

            <button 
                id="abrirCarrito"
                class="btn-carrito-premium"
            >

                🛒 
                <span id="contador">

                    0

                </span>

            </button>

            <button 
                id="cerrarSesion" 
                class="btn-cerrar"
            >

                🚪 Cerrar sesión

            </button>

        </div>

    </header>

    <!-- HERO -->

    <section class="hero-premium">

        <div class="hero-contenido">

            <h2>
                Catálogo de Plantas
            </h2>

            <p>
                Encuentra plantas para interior y exterior 🌿
            </p>

        </div>

    </section>

    <!-- PERFIL -->

    <section class="perfil-usuario">

        <div>

            <h3 id="saludoUsuario">

                👋 Hola usuario

            </h3>

            <p>

                Bienvenido a Viveros Estanislao 🌿

            </p>

        </div>

        <div>

            🌱 Vive rodeado de naturaleza

        </div>

    </section>

    <!-- CATEGORIAS -->

    <section class="categorias">

        <button class="categoria-btn activa">

            🌿 Todas

        </button>

        <button class="categoria-btn">

            ☀️ Sol

        </button>

        <button class="categoria-btn">

            🌑 Sombra

        </button>

        <button class="categoria-btn">

            🌤️ Resolana

        </button>

    </section>

    <!-- FILTROS -->

    <section class="filtros">

        <input
            type="text"
            id="buscador"
            placeholder="🔍 Buscar planta..."
        >

        <select id="filtroLuz">

            <option value="">
                Tipo de luz
            </option>

            <option>
                Sol
            </option>

            <option>
                Sombra
            </option>

            <option>
                Luz indirecta
            </option>

        </select>

        <select id="filtroRiego">

            <option value="">
                Tipo de riego
            </option>

            <option>
                Poco riego
            </option>

            <option>
                Riego moderado
            </option>

            <option>
                Riego frecuente
            </option>

        </select>

    </section>

    <!-- CATALOGO -->

    <section 
        class="catalogo"
        id="catalogo"
    >

    </section>

    <!-- HISTORIAL -->

    <section class="historial">

        <h2>
            📦 Historial de pedidos
        </h2>

        <div class="pedido-card">

            <p>
                Tus pedidos aparecerán aquí próximamente 😎
            </p>

        </div>

    </section>

    <!-- CARRITO -->

    <aside id="carrito" class="carrito">

        <div class="carrito-header">

            <h2>
                🛒 Carrito
            </h2>

            <span id="cerrarCarrito">

                ✖

            </span>

        </div>

        <div id="carritoItems">

        </div>

        <h3 id="total">

            Total: $0

        </h3>

        <button id="finalizarCompra">

            Finalizar compra

        </button>

    </aside>

    <!-- SCRIPTS -->

    <script 
        type="module"
        src="js/auth.js"
    ></script>

    <script 
        type="module"
        src="js/app.js"
    ></script>

    <script 
        type="module"
        src="js/stripe.js"
    ></script>

</body>
</html>
