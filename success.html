<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Pago exitoso
    </title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;

            font-family:
            Arial,
            Helvetica,
            sans-serif;

        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:

            linear-gradient(

                rgba(0,0,0,.45),
                rgba(0,0,0,.45)

            ),

            url("https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?q=80&w=1400&auto=format&fit=crop")

            center/cover;

            padding:20px;

        }

        .pago-box{

            width:100%;

            max-width:650px;

            background:white;

            border-radius:35px;

            padding:60px 50px;

            text-align:center;

            box-shadow:
            0 20px 50px rgba(0,0,0,.25);

            animation:aparecer .5s ease;

            position:relative;

            overflow:hidden;

        }

        .pago-box::before{

            content:"";

            position:absolute;

            top:0;
            left:0;

            width:100%;
            height:8px;

            background:#2e7d32;

        }

        @keyframes aparecer{

            from{

                opacity:0;
                transform:translateY(30px);

            }

            to{

                opacity:1;
                transform:translateY(0);

            }

        }

        .icono-check{

            width:120px;
            height:120px;

            margin:auto;

            border-radius:50%;

            background:#e8f5e9;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:65px;

            color:#2e7d32;

            margin-bottom:30px;

        }

        .pago-box h1{

            color:#1b5e20;

            font-size:50px;

            margin-bottom:20px;

        }

        .pago-box p{

            color:#666;

            font-size:20px;

            line-height:1.7;

            margin-bottom:35px;

        }

        .info-pedido{

            background:#f4f7fb;

            border-radius:20px;

            padding:25px;

            margin-bottom:35px;

            text-align:left;

        }

        .info-pedido h3{

            color:#1b5e20;

            margin-bottom:20px;

            font-size:24px;

        }

        .info-pedido p{

            margin:10px 0;

            font-size:16px;

            color:#444;

        }

        .acciones{

            display:flex;

            gap:20px;

            justify-content:center;

            flex-wrap:wrap;

        }

        .btn-volver{

            background:#2e7d32;

            color:white;

            text-decoration:none;

            padding:18px 35px;

            border-radius:15px;

            font-weight:bold;

            transition:.3s;

            font-size:17px;

        }

        .btn-volver:hover{

            background:#1b5e20;

            transform:translateY(-3px);

        }

        .btn-seguir{

            background:#f4f7fb;

            color:#1b1b1b;

            text-decoration:none;

            padding:18px 35px;

            border-radius:15px;

            font-weight:bold;

            transition:.3s;

            font-size:17px;

        }

        .btn-seguir:hover{

            background:#e4e9f1;

            transform:translateY(-3px);

        }

        @media(max-width:700px){

            .pago-box{

                padding:40px 25px;

            }

            .pago-box h1{

                font-size:38px;

            }

            .pago-box p{

                font-size:17px;

            }

            .acciones{

                flex-direction:column;

            }

            .btn-volver,
            .btn-seguir{

                width:100%;

            }

        }

    </style>

</head>

<body>

    <div class="pago-box">

        <div class="icono-check">

            ✅

        </div>

        <h1>
            Pago realizado
        </h1>

        <p>
            Tu pedido fue procesado correctamente 🌿<br>
            Gracias por comprar en Viveros Estanislao.
        </p>

        <div class="info-pedido">

            <h3>
                📦 Información del pedido
            </h3>

            <p id="nombreCliente">

                👤 Cliente:
                Cargando...

            </p>

            <p id="correoCliente">

                📧 Correo:
                Cargando...

            </p>

            <p id="direccionCliente">

                📍 Dirección:
                Cargando...

            </p>

        </div>

        <div class="acciones">

            <a 
                href="catalogo.html"
                class="btn-volver"
            >

                🌿 Volver al catálogo

            </a>

            <a 
                href="catalogo.html"
                class="btn-seguir"
            >

                🛒 Seguir comprando

            </a>

        </div>

    </div>

    <script type="module">

        import "./js/success.js";

        const usuario =

        JSON.parse(

            localStorage.getItem(
                "usuario"
            )

        );

        const direccion =

        localStorage.getItem(
            "direccionEntrega"
        );

        if(usuario){

            document.getElementById(
                "nombreCliente"
            ).innerHTML =

            `👤 Cliente: ${usuario.nombre}`;

            document.getElementById(
                "correoCliente"
            ).innerHTML =

            `📧 Correo: ${usuario.correo}`;

        }

        document.getElementById(
            "direccionCliente"
        ).innerHTML =

        `📍 Dirección: ${direccion || "Sin dirección"}`;

    </script>

</body>
</html>
