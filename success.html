<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Pago exitoso
</title>

<link
rel="stylesheet"
href="css/style.css"
>

<style>

body{

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    background:#f5f5f5;

}

.pago-box{

    background:white;

    padding:50px;

    border-radius:25px;

    text-align:center;

    box-shadow:
    0 10px 30px rgba(0,0,0,.1);

    width:90%;

    max-width:500px;

}

.pago-box h1{

    color:#2e7d32;

    margin-bottom:20px;

    font-size:40px;

}

.pago-box p{

    color:#666;

    font-size:18px;

    margin-bottom:30px;

}

.pago-box a{

    display:inline-block;

    background:#2e7d32;

    color:white;

    text-decoration:none;

    padding:15px 25px;

    border-radius:12px;

    font-weight:bold;

    transition:.3s;

}

.pago-box a:hover{

    background:#1b5e20;

    transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="pago-box">

<h1>
✅ Pago realizado
</h1>

<p>
Tu pedido fue procesado correctamente 🌿
</p>

<a href="catalogo.html">

Volver al catálogo

</a>

</div>

<script
type="module"
src="js/success.js"
></script>

</body>
</html>
